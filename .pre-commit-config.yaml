# Install pre-commit hooks via
# pre-commit install

exclude: >
    (?x)^(
      \.vscode/settings\.json|
      tests/.*xml|
      tests/.*txt|
    )$

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-json
    - id: check-yaml
    - id: end-of-file-fixer
    - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
    - id: ruff
      args: [--fix]
    - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
    - id: mypy
      # install sphinx so the hook type-checks with real types,
      # matching the tox mypy environment (which installs the package)
      additional_dependencies: [sphinx]

  - repo: local
    hooks:
    - id: css
      name: css
      description: Generate the compiled CSS from style/design.toml and style/*.css
      files: ^(style/.*\.(css|toml)|tools/generate_css\.py)$
      language: python
      language_version: python3.11  # the generator needs stdlib tomllib
      additional_dependencies: [rcssmin]
      entry: python tools/generate_css.py
      require_serial: true
      pass_filenames: false

    - id: tsc
      name: tsc (jsdoc)
      entry: tsc
      language: node
      files: \.(js)$
      types_or: [javascript]
      args: [--allowJs, --noEmit, --strict]
      additional_dependencies:
      - typescript
